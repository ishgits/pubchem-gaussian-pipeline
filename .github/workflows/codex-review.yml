# Independent structured review by Codex (different model family from the
# implementer). Produces findings in the repo's Blocker/Major/Moderate/Minor/
# Verified-Strength taxonomy with stable IDs, posts them as a PR comment, and
# uploads the review as a downloadable artifact.
#
# Requires repo secret: OPENAI_API_KEY
# Gated on review-readiness passing first (objective floor before judgment).
name: codex-review

on:
  workflow_run:
    workflows: ["review-readiness"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    # only run if the floor was green and it was a PR event
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/review.md
          output-file: codex-review-output.md
          safety-strategy: read-only

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-review
          path: codex-review-output.md

      - name: Find the PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              head_sha: context.payload.workflow_run.head_sha, per_page: 20,
            });
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length) return prs[0].number;
            // fallback: search open PRs by head sha
            const found = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:pr ${context.payload.workflow_run.head_sha}`,
            });
            return found.data.items.length ? found.data.items[0].number : 0;
          result-encoding: string

      - name: Post review as PR comment
        if: steps.pr.outputs.result != '0'
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.codex.outputs.final-message }}
        with:
          script: |
            const body = "## Codex independent review\n\n" + process.env.REVIEW;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: Number("${{ steps.pr.outputs.result }}"),
              body,
            });
