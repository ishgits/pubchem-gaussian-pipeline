# The OBJECTIVE floor. If this is red, the change is not review-ready —
# no human or agent review should begin. Fast, no network, no Open Babel/Gaussian.
name: review-readiness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests pytest

      - name: Unit tests
        run: pytest tests/ -q

      - name: Scientific invariant checks
        run: python scripts/check_invariants.py
