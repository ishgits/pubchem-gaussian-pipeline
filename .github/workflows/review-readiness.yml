# The OBJECTIVE floor. If this is red, the change is not review-ready —
# no human or agent review should begin. Fast, no network, no Open Babel/Gaussian.
name: review-readiness

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # numpy is not listed explicitly (unused outside pipeline/; pulled in by
          # pandas/rdkit). See requirements-lock.txt for the pinned v2.0.0 stack.
          pip install pandas requests pytest rdkit

      - name: Unit tests
        run: pytest tests/ -q

      - name: Scientific invariant checks
        run: python scripts/check_invariants.py

      - name: Repo hygiene — no ignored-but-tracked generated files (B-04)
        run: |
          tracked="$(git ls-files -ci --exclude-standard)"
          if [ -n "$tracked" ]; then
            echo "These generated files are ignored by .gitignore but still tracked:"
            echo "$tracked"
            echo "Run: git rm -r --cached <path> and commit."
            exit 1
          fi
          test -z "$tracked"
